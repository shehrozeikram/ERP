# SGC ERP — single site definition (no duplicate server_name with other vhosts).
# Static files: deploy-simple.sh copies client/build → /var/www/html
# API: Node on 127.0.0.1:5001
#
# Install on server:
#   sudo cp deploy/nginx-sgc-erp.conf /etc/nginx/sites-available/sgc-erp
#   sudo ln -sf /etc/nginx/sites-available/sgc-erp /etc/nginx/sites-enabled/sgc-erp
#   sudo nginx -t && sudo systemctl reload nginx
#
# If you see "conflicting server name", disable the stock default site once:
#   sudo rm /etc/nginx/sites-enabled/default
# (Backup first; see scripts/nginx-production-setup.sh)

# ── HTTP: apex + www → HTTPS (single listener, no duplicate names) ─────────
server {
    listen 80;
    listen [::]:80;
    server_name tovus.net www.tovus.net;
    return 301 https://tovus.net$request_uri;
}

# ── HTTP: bare IP → canonical site (avoids duplicate server_name in other files) ──
server {
    listen 80;
    listen [::]:80;
    server_name 68.183.215.177;
    return 301 https://tovus.net$request_uri;
}

# ── HTTPS: app + API + uploads + websockets ─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tovus.net www.tovus.net;

    ssl_certificate /etc/letsencrypt/live/tovus.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tovus.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/xml;

    location = /index.html {
        root /var/www/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        client_max_body_size 10M;
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* ^/uploads/.*\.pdf$ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 10M;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~* ^/uploads/.*\.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 10M;
    }

    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
